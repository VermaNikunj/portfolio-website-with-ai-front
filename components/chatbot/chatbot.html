<div class="chatbot-window" id="chatbot-window">
	<div class="chatbot-header">
		<span>
			<i class="fa-solid fa-robot"></i>
			<span data-i18n="chatbot.headerTitle"></span>
		</span>
		<button class="chatbot-close-btn" onclick="toggleChatbot()">
			<i class="fa-solid fa-xmark"></i>
		</button>
	</div>
	<div class="chatbot-messages" id="chatbot-messages">
		<div class="chatbot-msg bot" data-i18n="chatbot.welcomeMessage"></div>
	</div>
	<div class="chatbot-input-row">
		<input type="text" id="chatbot-input" placeholder="Ask about Nikunj..." onkeydown="chatbotHandleKey(event)" />
		<button class="chatbot-send-btn" onclick="chatbotSend()">
			<i class="fa-solid fa-paper-plane"></i>
		</button>
	</div>
</div>
